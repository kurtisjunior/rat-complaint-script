name: Submit Complaint

on:
  workflow_dispatch:
  schedule:
    # Check every 15 minutes Mon/Wed/Thu; gate below picks one random ET slot/day.
    # UTC window covers 11am-3pm ET across DST changes.
    - cron: '*/15 15-20 * * 1,3,4'

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Select random run slot (11am-3pm ET)
        if: github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import os
          import random
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now_et = datetime.now(ZoneInfo("America/New_York"))
          hour = now_et.hour
          minute = now_et.minute

          should_run = False
          selected_label = "n/a"

          if 11 <= hour < 15 and minute in (0, 15, 30, 45):
              day_seed = now_et.strftime("%Y-%m-%d")
              rng = random.Random(day_seed)
              slots = [(h, m) for h in range(11, 15) for m in (0, 15, 30, 45)]
              selected_hour, selected_minute = slots[rng.randrange(len(slots))]
              selected_label = f"{selected_hour:02d}:{selected_minute:02d} ET"
              should_run = (hour == selected_hour and minute == selected_minute)

          print(f"Now ET: {now_et:%Y-%m-%d %H:%M}")
          print(f"Selected random slot: {selected_label}")
          print(f"Should run now: {should_run}")

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"SHOULD_RUN={'true' if should_run else 'false'}\n")
              f.write(f"RANDOM_SLOT_ET={selected_label}\n")
          PY

      - name: Skip if not selected random slot
        if: github.event_name == 'schedule' && env.SHOULD_RUN != 'true'
        run: |
          echo "Skipping this run. Today's selected slot: ${RANDOM_SLOT_ET}."

      - name: Submit complaint
        if: github.event_name == 'workflow_dispatch' || env.SHOULD_RUN == 'true'
        run: python submit.py
        env:
          ADDRESS: "932 Carroll St"
          CITY: "Brooklyn"
          STATE: "NY"
          ZIP: "11225"

      - name: Publish submitted details to run logs and summary
        if: always() && (github.event_name == 'workflow_dispatch' || env.SHOULD_RUN == 'true')
        run: |
          if [ -f artifacts/submission_details.txt ]; then
            echo "===== Submission Details ====="
            cat artifacts/submission_details.txt
            echo "=============================="
            {
              echo "## Submission Details"
              echo
              echo '```'
              cat artifacts/submission_details.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "submission_details.txt not found (run likely failed before final submission details were saved)."
            {
              echo "## Submission Details"
              echo
              echo "No submission details file was generated in this run."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify success via ntfy
        if: success() && (github.event_name == 'workflow_dispatch' || env.SHOULD_RUN == 'true')
        run: |
          curl -s \
            -H "Title: 311 Rat Complaint Submitted" \
            -H "Tags: rat,white_check_mark" \
            -d "$(cat artifacts/submission_details.txt)" \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"

      - name: Notify failure via ntfy
        if: failure() && (github.event_name == 'workflow_dispatch' || env.SHOULD_RUN == 'true')
        run: |
          curl -s \
            -H "Title: 311 Rat Complaint Failed" \
            -H "Tags: rat,x" \
            -H "Priority: high" \
            -d "Submission failed at $(TZ='America/New_York' date '+%I:%M %p %Z'). Check workflow artifacts." \
            "https://ntfy.sh/${{ secrets.NTFY_TOPIC }}"

      - name: Upload artifacts
        if: always() && (github.event_name == 'workflow_dispatch' || env.SHOULD_RUN == 'true')
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: artifacts
          if-no-files-found: ignore
